blueprint:
  name: Žiadosť o kúrenie podľa ventilu a teploty
  description: Zapne pomocný prepínač (žiadosť), ak je ventil otvorený, kúrenie povolené a teplota nízka.
  domain: automation
  input:
    valve_position:
      name: Pozícia ventilu
      description: Entita (number), ktorá udáva otvorenie ventilu.
      selector:
        entity:
          domain: number
    min_valve_open:
      name: Minimálne otvorenie ventilu
      description: Pomocné číslo (input_number), ktoré určuje hranicu otvorenia.
      selector:
        entity:
          domain: input_number
    main_heat_switch:
      name: Hlavný vypínač kúrenia
      description: Prepínač (input_boolean), ktorý povoľuje kúrenie v danej zóne.
      selector:
        entity:
          domain: input_boolean
    current_temperature:
      name: Aktuálna teplota
      description: Senzor teploty v miestnosti.
      selector:
        entity:
          domain: sensor
          device_class: temperature
    setpoint_temp:
      name: Nastavená teplota (Setpoint)
      description: Entita (number/input_number), ktorá určuje cieľovú teplotu.
      selector:
        entity:
          domain:
            - number
            - input_number
    target_boolean:
      name: Výstupná žiadosť
      description: Pomocný prepínač, ktorý sa zapne/vypne (napr. input_boolean.ziadost_kuchyna).
      selector:
        target:
          entity:
            domain: input_boolean

mode: single

trigger:
  - platform: state
    entity_id: !input valve_position
  - platform: state
    entity_id: !input main_heat_switch
  - platform: state
    entity_id: !input current_temperature

action:
  - choose:
      # PODMIENKA PRE ZAPNUTIE (AND)
      - conditions:
          - condition: and
            conditions:
              - condition: numeric_state
                entity_id: !input valve_position
                above: !input min_valve_open
              - condition: state
                entity_id: !input main_heat_switch
                state: "on"
              - condition: template
                value_template: "{{ states(current_temp_ent) | float < states(setpoint_ent) | float }}"
        sequence:
          - action: input_boolean.turn_on
            target: !input target_boolean

      # PODMIENKA PRE VYPNUTIE (OR)
      - conditions:
          - condition: or
            conditions:
              - condition: numeric_state
                entity_id: !input valve_position
                below: !input min_valve_open
              - condition: state
                entity_id: !input main_heat_switch
                state: "off"
              - condition: template
                value_template: "{{ states(current_temp_ent) | float >= states(setpoint_ent) | float }}"
        sequence:
          - action: input_boolean.turn_off
            target: !input target_boolean

variables:
  # Prevod inputov na premenné pre použitie v šablónach (templates)
  current_temp_ent: !input current_temperature
  setpoint_ent: !input setpoint_temp
